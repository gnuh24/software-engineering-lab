services:

  mysql:

    image: mysql:8.4.6

    container_name: nplusone-mysql

    environment:
      MYSQL_DATABASE: nplusone_lab
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

    ports:
      - "3306:3306"

    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: unless-stopped